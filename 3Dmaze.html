<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windows 95 3D Maze - 1080p Engine</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            cursor: crosshair;
            font-family: 'Microsoft JhengHei', sans-serif;
            transition: filter 0.1s ease;
        }
        .inverted-end {
            filter: invert(1) hue-rotate(180deg) !important;
            background-color: #fff !important;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #dialogue-overlay {
            display: none;
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            background: rgba(10, 10, 10, 0.9);
            border: 3px solid #444;
            padding: 25px;
            color: #d8d8d8;
            font-size: 24px;
            letter-spacing: 2px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 999;
        }
        #dialogue-hint {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        #curse-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 99999;
        }
        #dev-panel {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px dashed #00ff00;
            padding: 15px;
            color: #00ff00;
            font-family: monospace;
            font-size: 13px;
            z-index: 10000;
            width: 320px;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
        }
        .dev-title {
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .dev-section {
            margin-bottom: 8px;
        }
        .dev-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        #dev-panel input[type="number"] {
            background: #111;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 2px 4px;
            width: 70px;
            font-family: monospace;
        }
        #dev-panel input[type="checkbox"] {
            accent-color: #00ff00;
            cursor: pointer;
        }
        .dev-stats {
            border-top: 1px dashed #00ff00;
            margin-top: 10px;
            padding-top: 8px;
            font-size: 11px;
            color: #88ff88;
        }
        .dev-credit {
            margin-top: 8px;
            padding-top: 5px;
            border-top: 1px solid #00ff00;
            font-size: 10px;
            color: #00aa00;
            text-align: center;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <canvas id="canvas" width="1920" height="1080"></canvas>
    <div id="curse-screen"></div>
    
    <div id="dialogue-overlay">
        <div id="dialogue-text"></div>
        <div id="dialogue-hint"></div>
    </div>

    <div id="dev-panel">
        <div class="dev-title">⚙️ DEV MODE OVERRIDE ⚙️</div>
        <div class="dev-section">
            <div class="dev-row">
                <label>房間數:</label>
                <input type="number" id="dev-room" min="1">
            </div>
            <div class="dev-row">
                <label>FPS 限制 (0=無):</label>
                <input type="number" id="dev-fps" min="0" max="999">
            </div>
            <div class="dev-row">
                <label>FOV 視角範圍:</label>
                <input type="number" id="dev-fov" min="30" max="150" step="5">
            </div>
            <div class="dev-row">
                <label>走路速度:</label>
                <input type="number" id="dev-walk" min="0" max="0.5" step="0.005">
            </div>
            <div class="dev-row">
                <label>跑步速度:</label>
                <input type="number" id="dev-run" min="0" max="0.5" step="0.005">
            </div>
            <div class="dev-row">
                <label>跳躍功能 (Jumpable):</label>
                <input type="checkbox" id="dev-jump">
            </div>
            <div class="dev-row">
                <label>無限跳躍 (Infinite Jump):</label>
                <input type="checkbox" id="dev-infjump">
            </div>
            <div class="dev-row">
                <label>飛行模式 (Fly):</label>
                <input type="checkbox" id="dev-fly">
            </div>
            <div class="dev-row">
                <label>穿牆模式 (Noclip):</label>
                <input type="checkbox" id="dev-noclip">
            </div>
            <div class="dev-row">
                <label>垂直視角轉動 (Pitch):</label>
                <input type="checkbox" id="dev-pitch">
            </div>
            <div class="dev-row">
                <label>地圖顯示 (Minimap):</label>
                <input type="checkbox" id="dev-map">
            </div>
        </div>
        <div class="dev-stats">
            <div>運行時間: <span id="stat-time">0.0s</span></div>
            <div>目前影格: <span id="stat-fps">0</span> FPS</div>
            <div>平均影格: <span id="stat-avg-fps">0</span> FPS</div>
            <div>總傳送次數: <span id="stat-portals">0</span></div>
            <div>版本號: <span id="stat-version">v.1.2.0</span></div>
        </div>
        <div class="dev-credit">
            該由Isvxs開發；Isvxs，ClassicGames(3D maze)，workers.dev，2026。
        </div>
    </div>

<script>
if (localStorage.getItem('the_dust_curse') === 'true') {
    const curseOverlay = document.getElementById('curse-screen');
    curseOverlay.style.display = 'block';
    
    let starClicks = 0;
    const handleCurseKey = (e) => {
        if (e.key === '*' || e.code === 'NumpadMultiply') {
            starClicks++;
            if (starClicks >= 5) {
                clearTimeout(curseTimeout);
                window.removeEventListener('keydown', handleCurseKey);
                localStorage.removeItem('the_dust_curse');
                curseOverlay.style.display = 'none';
                roomCount = 1;
                generateDenseMaze();
                startLoop();
            }
        }
    };
    window.addEventListener('keydown', handleCurseKey);

    const curseTimeout = setTimeout(() => {
        window.close();
        setTimeout(() => {
            window.location.href = "about:blank";
        }, 50);
    }, 1000);
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const diagOverlay = document.getElementById('dialogue-overlay');
const diagText = document.getElementById('dialogue-text');

const MAP_SIZE = 31; 
let map = [];
let portalX = 0, portalY = 0; 
let roomCount = 1; 
const GAME_VERSION = "v.1.2.0";

const randomSlogans = ["加油...", "有意義嗎？", "沒意義的...", "出口在哪？", "永無止境", "回頭吧", "這是現實嗎？"];
let eyeProtectionMode = false;

let npcActive = false;
let npcX = 0, npcY = 0;
let npcDialogueStep = -1;
let npcTriggeredInThisRoom = false; 
let showRedSmile = false; 
let isTyping = false;
let typingTimeout = null;
let autoNextTimeout = null;

const npcTexts = [
    "你好...",
    "我從未意識到有人能察覺到我..",
    "你，真獨特，有耐心在這裡繞圈子.",
    "但，你意識到我的存在了.",
    "再見。"
];

let smileyActive = false;
let smileyX = 0, smileyY = 0;
let smileySpeed = 0.008; 
let smileyInVision = false; 

let lastMoveTime = performance.now();
let screenFogIntensity = 0;
let wasteSpeechTriggered = false;

let startTime = performance.now();
let totalFrameCount = 0;
let lastFpsUpdateTime = performance.now();
let fpsCountThisSecond = 0;
let currentFpsDisplay = 0;
let totalPortalCount = 0;
let devModeActive = false;
let devSevenClicks = 0;

let cfg = {
    fov: 66,
    walkSpeed: 0.045,
    runSpeed: 0.08,
    jumpable: false,
    infiniteJump: false,
    fly: false,
    noclip: false,
    pitchEnabled: false,
    minimap: false,
    fpsLimit: 0
};

let isJumping = false;
let jumpTime = 0;
let zOffset = 0; 
let pitchAngle = 0; 

function generateDenseMaze() {
    map = Array(MAP_SIZE).fill(null).map(() => Array(MAP_SIZE).fill(1));
    let walls = [];
    
    function addWalls(x, y) {
        if (x > 1 && map[y][x-1] === 1) walls.push({x: x-1, y: y, px: x-2, py: y});
        if (x < MAP_SIZE-2 && map[y][x+1] === 1) walls.push({x: x+1, y: y, px: x+2, py: y});
        if (y > 1 && map[y-1][x] === 1) walls.push({x: x, y: y-1, px: x, py: y-2});
        if (y < MAP_SIZE-2 && map[y+1][x] === 1) walls.push({x: x, y: y+1, px: x, py: y+2});
    }

    map[1][1] = 0;
    addWalls(1, 1);

    while (walls.length > 0) {
        let randIdx = Math.floor(Math.random() * walls.length);
        let wall = walls[randIdx];
        walls.splice(randIdx, 1);

        if (map[wall.py][wall.px] === 1) {
            map[wall.y][wall.x] = 0;
            map[wall.py][wall.px] = 0;
            addWalls(wall.px, wall.py);
        }
    }

    const isPass = (x, y) => (x >= 0 && x < MAP_SIZE && y >= 0 && y < MAP_SIZE) && (map[y][x] === 0 || map[y][x] === 2 || map[y][x] === 5);
    const isWall = (x, y) => (x < 0 || x >= MAP_SIZE || y < 0 || y >= MAP_SIZE) || (map[y][x] !== 0 && map[y][x] !== 2 && map[y][x] !== 5);

    for (let y = 1; y < MAP_SIZE - 1; y++) {
        for (let x = 1; x < MAP_SIZE - 1; x++) {
            if (map[y][x] === 0) {
                if (isWall(x+1, y) && isWall(x-1, y) && isWall(x, y+1) && isWall(x, y-1)) {
                    let dirs = [[1,0], [-1,0], [0,1], [0,-1]].sort(() => Math.random() - 0.5);
                    for (let [dx, dy] of dirs) {
                        let nx = x + dx;
                        let ny = y + dy;
                        if (nx > 0 && nx < MAP_SIZE - 1 && ny > 0 && ny < MAP_SIZE - 1) {
                            map[ny][nx] = 0; 
                            break;
                        }
                    }
                }
            }
        }
    }

    map[1][2] = 2; 

    for (let y = 1; y < MAP_SIZE - 1; y++) {
        for (let x = 1; x < MAP_SIZE - 1; x++) {
            if (map[y][x] === 0) {
                if (map[y-1][x] === 0 && map[y+1][x] === 0 && map[y][x-1] === 0 && map[y][x+1] === 0) {
                    map[y][x] = 1; 
                }
                if (map[y][x-1] === 0 && map[y][x+1] === 0 && Math.random() < 0.7) {
                    if (map[y-1][x] === 1) map[y-1][x] = 0;
                    else if (map[y+1][x] === 1) map[y+1][x] = 0;
                }
                if (map[y-1][x] === 0 && map[y+1][x] === 0 && Math.random() < 0.7) {
                    if (map[y][x-1] === 1) map[y][x-1] = 0;
                    else if (map[y][x+1] === 1) map[y][x+1] = 0;
                }
            }
        }
    }

    if (map[1][1] !== 0) map[1][1] = 0;
    if (map[1][2] !== 2) map[1][2] = 2;
    if (isWall(2, 1) && isWall(1, 2)) map[2][1] = 0; 

    let queue = [{x: 1, y: 1, dist: 0}];
    let visited = Array(MAP_SIZE).fill(null).map(() => Array(MAP_SIZE).fill(false));
    visited[1][1] = true;
    
    let maxDist = -1;
    let deepestDeadEnds = [];

    while (queue.length > 0) {
        let curr = queue.shift();
        let wallCount = 0;
        if (isWall(curr.x+1, curr.y)) wallCount++;
        if (isWall(curr.x-1, curr.y)) wallCount++;
        if (isWall(curr.x, curr.y+1)) wallCount++;
        if (isWall(curr.x, curr.y-1)) wallCount++;

        if (wallCount === 3 && !(curr.x === 1 && curr.y === 1)) {
            if (curr.dist > maxDist) {
                maxDist = curr.dist;
                deepestDeadEnds = [curr]; 
            } else if (curr.dist === maxDist) {
                deepestDeadEnds.push(curr);
            }
        }

        const directions = [[1,0], [-1,0], [0,1], [0,-1]];
        for (let [dx, dy] of directions) {
            let nx = curr.x + dx;
            let ny = curr.y + dy;
            if (nx > 0 && nx < MAP_SIZE && ny > 0 && ny < MAP_SIZE && (map[ny][nx] === 0 || map[ny][nx] === 2) && !visited[ny][nx]) {
                visited[ny][nx] = true;
                queue.push({x: nx, y: ny, dist: curr.dist + 1});
            }
        }
    }

    let finalPortalTile = deepestDeadEnds[Math.floor(Math.random() * deepestDeadEnds.length)] || {x: MAP_SIZE-2, y: MAP_SIZE-2};
    portalX = finalPortalTile.x;
    portalY = finalPortalTile.y;
    
    map[portalY][portalX] = 5; 

    for (let y = 1; y < MAP_SIZE - 1; y++) {
        for (let x = 1; x < MAP_SIZE - 1; x++) {
            if (map[y][x] === 0 || map[y][x] === 2 || map[y][x] === 5) {
                if (isWall(x+1, y) && isWall(x-1, y) && isWall(x, y+1) && isWall(x, y-1)) {
                    let dirs = [[1,0], [-1,0], [0,1], [0,-1]].sort(() => Math.random() - 0.5);
                    for (let [dx, dy] of dirs) {
                        let nx = x + dx;
                        let ny = y + dy;
                        if (nx > 0 && nx < MAP_SIZE - 1 && ny > 0 && ny < MAP_SIZE - 1) {
                            if (map[ny][nx] !== 5 && map[ny][nx] !== 2) {
                                map[ny][nx] = 0; 
                                break;
                            }
                        }
                    }
                }
            }
        }
    }

    let dynamicTexId = 10;
    for (let key in textures) { if (parseInt(key) >= 10) delete textures[key]; }

    for (let y = 1; y < MAP_SIZE - 1; y++) {
        for (let x = 1; x < MAP_SIZE - 1; x++) {
            if (map[y][x] === 1) {
                const h凹 = isPass(x, y+1) && isWall(x-1, y) && isWall(x+1, y) && isWall(x, y-1);
                const h倒凹 = isPass(x, y-1) && isWall(x-1, y) && isWall(x+1, y) && isWall(x, y+1);
                const v凹 = isPass(x+1, y) && isWall(x, y-1) && isWall(x, y+1) && isWall(x-1, y);
                const v倒凹 = isPass(x-1, y) && isWall(x, y-1) && isWall(x, y+1) && isWall(x+1, y);

                if (h凹 || h倒凹 || v凹 || v倒凹) {
                    let r = Math.random();
                    if (r < 0.2) map[y][x] = 3; 
                    else if (r < 0.4) map[y][x] = 4; 
                    else if (r < 0.7) {
                        let slogan = randomSlogans[Math.floor(Math.random() * randomSlogans.length)];
                        textures[dynamicTexId] = createSloganTexture(slogan);
                        map[y][x] = dynamicTexId;
                        dynamicTexId++;
                    }
                } else {
                    if (Math.random() < 0.03) {
                        let slogan = randomSlogans[Math.floor(Math.random() * randomSlogans.length)];
                        textures[dynamicTexId] = createSloganTexture(slogan);
                        map[y][x] = dynamicTexId;
                        dynamicTexId++;
                    }
                }
            }
        }
    }
    
    npcTriggeredInThisRoom = false;
    showRedSmile = false;
    if (roomCount >= 10) {
        npcActive = true;
        npcDialogueStep = -1;
        npcX = posX - Math.cos(angle) * 0.8;
        npcY = posY - Math.sin(angle) * 0.8;
        lastMoveTime = performance.now();
        screenFogIntensity = 0;
        wasteSpeechTriggered = false;
    } else {
        npcActive = false;
    }

    if (roomCount >= 15) {
        smileyActive = true;
        smileyX = MAP_SIZE - 2.5;
        smileyY = MAP_SIZE - 2.5;
    } else {
        smileyActive = false;
    }

    updateInfoTexture();
}

let devPanel = document.getElementById('dev-panel');

function toggleDevPanel() {
    if (devPanel.style.display === 'block') {
        devPanel.style.display = 'none';
        devModeActive = false;
    } else {
        devPanel.style.display = 'block';
        devModeActive = true;
        syncInputsToConfig();
    }
}

window.addEventListener('keydown', (e) => {
    if (['w', 'W', 'ArrowUp'].includes(e.key)) { controls.forward = true; resetIdleTimer(); }
    if (['s', 'S', 'ArrowDown'].includes(e.key)) { controls.backward = true; resetIdleTimer(); }
    if (['a', 'A', 'ArrowLeft'].includes(e.key)) { controls.left = true; resetIdleTimer(); }   
    if (['d', 'D', 'ArrowRight'].includes(e.key)) { controls.right = true; resetIdleTimer(); } 
    if (e.key === 'Shift') { controls.shift = true; resetIdleTimer(); }
    if (e.key === 'p' || e.key === 'P') eyeProtectionMode = !eyeProtectionMode;
    
    if (e.key === ' ' && cfg.jumpable) {
        if (!isJumping) {
            isJumping = true;
            jumpTime = 0;
        } else if (cfg.infiniteJump) {
            jumpTime = 0; 
        }
    }

    if (e.key === '.' || e.code === 'NumpadDecimal') {
        if (!isTransitioning && npcDialogueStep === -1 && !wasteSpeechTriggered) {
            startPortalTransition(false); 
        }
    }

    if (e.key === '7' || e.code === 'Numpad7') {
        devSevenClicks++;
        if (devSevenClicks >= 3) {
            devSevenClicks = 0;
            toggleDevPanel();
        }
    }
});

function syncInputsToConfig() {
    document.getElementById('dev-room').value = roomCount;
    document.getElementById('dev-fps').value = cfg.fpsLimit;
    document.getElementById('dev-fov').value = cfg.fov;
    document.getElementById('dev-walk').value = cfg.walkSpeed;
    document.getElementById('dev-run').value = cfg.runSpeed;
    document.getElementById('dev-jump').checked = cfg.jumpable;
    document.getElementById('dev-infjump').checked = cfg.infiniteJump;
    document.getElementById('dev-fly').checked = cfg.fly;
    document.getElementById('dev-noclip').checked = cfg.noclip;
    document.getElementById('dev-pitch').checked = cfg.pitchEnabled;
    document.getElementById('dev-map').checked = cfg.minimap;
    document.getElementById('stat-version').innerText = GAME_VERSION;
}

function setupDevListeners() {
    document.getElementById('dev-room').addEventListener('change', (e) => {
        let val = parseInt(e.target.value);
        if (!isNaN(val) && val >= 1) { roomCount = val; generateDenseMaze(); }
    });
    document.getElementById('dev-fps').addEventListener('change', (e) => {
        let val = parseInt(e.target.value);
        if (!isNaN(val) && val >= 0) cfg.fpsLimit = val;
    });
    document.getElementById('dev-fov').addEventListener('change', (e) => {
        let val = parseInt(e.target.value);
        if (!isNaN(val) && val >= 30 && val <= 150) { cfg.fov = val; updateDirection(); }
    });
    document.getElementById('dev-walk').addEventListener('change', (e) => {
        let val = parseFloat(e.target.value);
        if (!isNaN(val) && val >= 0) cfg.walkSpeed = val;
    });
    document.getElementById('dev-run').addEventListener('change', (e) => {
        let val = parseFloat(e.target.value);
        if (!isNaN(val) && val >= 0) cfg.runSpeed = val;
    });
    document.getElementById('dev-jump').addEventListener('change', (e) => { cfg.jumpable = e.target.checked; });
    document.getElementById('dev-infjump').addEventListener('change', (e) => { cfg.infiniteJump = e.target.checked; });
    document.getElementById('dev-fly').addEventListener('change', (e) => { 
        cfg.fly = e.target.checked; 
        if(!cfg.fly) { zOffset = 0; isJumping = false; }
    });
    document.getElementById('dev-noclip').addEventListener('change', (e) => { cfg.noclip = e.target.checked; });
    document.getElementById('dev-pitch').addEventListener('change', (e) => { 
        cfg.pitchEnabled = e.target.checked; 
        if(!cfg.pitchEnabled) pitchAngle = 0;
    });
    document.getElementById('dev-map').addEventListener('change', (e) => { cfg.minimap = e.target.checked; });
}

window.addEventListener('keyup', (e) => {
    if (['w', 'W', 'ArrowUp'].includes(e.key)) controls.forward = false;
    if (['s', 'S', 'ArrowDown'].includes(e.key)) controls.backward = false;
    if (['a', 'A', 'ArrowLeft'].includes(e.key)) controls.left = false;
    if (['d', 'D', 'ArrowRight'].includes(e.key)) controls.right = false;
    if (e.key === 'Shift') controls.shift = false;
});
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    // 如果有攝影機矩陣或投影更新邏輯，在此添加
}

function resetIdleTimer() {
    lastMoveTime = performance.now();
    screenFogIntensity = 0;
}

// 修正後的事件監聽與初始化
window.addEventListener('resize', resize);

const controls = {
    forward: false, backward: false, left: false, right: false, shift: false
};

let posX = 1.5, posY = 1.5, angle = 0, dirX = 1, dirY = 0, planeX = 0, planeY = 0.66;
let isTransitioning = false, transitionAlpha = 0;
let lastTime = performance.now();

function updateDirection() {
    dirX = Math.cos(angle);
    dirY = Math.sin(angle);
    planeX = -dirY * (cfg.fov / 90);
    planeY = dirX * (cfg.fov / 90);
}

// 確保在初始化時呼叫
resize();
updateDirection();
canvas.addEventListener('click', (e) => {
    if (document.pointerLockElement !== canvas && npcDialogueStep === -1 && !wasteSpeechTriggered) {
        canvas.requestPointerLock();
        return;
    }
    
    if (npcActive && npcDialogueStep >= 0 && !isTyping && !wasteSpeechTriggered) {
        advanceDialogue();
    } 
    else if (npcActive && npcDialogueStep === -1 && !wasteSpeechTriggered && !npcTriggeredInThisRoom) {
        let toNpcX = npcX - posX;
        let toNpcY = npcY - posY;
        let dist = Math.sqrt(toNpcX*toNpcX + toNpcY*toNpcY);
        
        let angleToNpc = Math.atan2(toNpcY, toNpcX);
        let angleDiff = angleToNpc - angle;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        
        let playerIsBehindNpc = Math.abs(angleDiff) > (Math.PI / 2); 
        let triggerDistance = playerIsBehindNpc ? 2.2 : 1.5; 
        let triggerAngle = playerIsBehindNpc ? 1.2 : 0.6;    

        if (dist < triggerDistance && (playerIsBehindNpc || Math.abs(angleDiff) < triggerAngle)) {
            npcTriggeredInThisRoom = true; 
            document.exitPointerLock(); 
            angle = Math.atan2(npcY - posY, npcX - posX);
            pitchAngle = 0; 
            updateDirection();
            startNpcDialogueSequence();
        }
    }
});

document.addEventListener('mousemove', (e) => {
    if (e.movementX !== 0 || e.movementY !== 0) {
        resetIdleTimer();
    }
    if (document.pointerLockElement === canvas && !isTransitioning && npcDialogueStep === -1) {
        let mouseSpeed = 0.0022; 
        angle += e.movementX * mouseSpeed;
        
        if (cfg.pitchEnabled) {
            pitchAngle -= e.movementY * mouseSpeed * 400; 
            pitchAngle = Math.max(-400, Math.min(400, pitchAngle));
        }
        
        updateDirection();
    }
});

function startNpcDialogueSequence() {
    npcDialogueStep = 0;
    diagOverlay.style.display = 'block';
    typeText(npcTexts[0], () => {
        autoNextTimeout = setTimeout(advanceDialogue, 2000);
    });
}

function advanceDialogue() {
    if (wasteSpeechTriggered) return;
    npcDialogueStep++;
    if (npcDialogueStep < npcTexts.length) {
        if (npcDialogueStep === npcTexts.length - 1) {
            showRedSmile = true; 
        }
        typeText(npcTexts[npcDialogueStep], () => {
            autoNextTimeout = setTimeout(advanceDialogue, 2500); 
        });
    } else {
        triggerCurseEnd();
    }
}

function triggerCurseEnd() {
    diagOverlay.style.display = 'none';
    localStorage.setItem('the_dust_curse', 'true');
    window.close();
    setTimeout(() => {
        window.location.href = "about:blank";
    }, 50);
}

function triggerSmileyJumpscare() {
    document.exitPointerLock();
    document.body.classList.add('inverted-end'); 
    setTimeout(() => {
        window.close();
        setTimeout(() => {
            window.location.href = "about:blank";
        }, 50);
    }, 1200); 
}

function typeText(fullText, callback) {
    isTyping = true;
    diagText.innerText = "";
    let index = 0;
    
    function nextChar() {
        if (index < fullText.length) {
            let char = fullText[index];
            diagText.innerText += char;
            index++;
            
            let delay = 60;
            if (char === ',' || char === '，') delay = 400;
            else if (char === '.') delay = 600;
            
            typingTimeout = setTimeout(nextChar, delay);
        } else {
            isTyping = false;
            if (callback) callback();
        }
    }
    nextChar();
}

function getGrid(x, y) {
    if (x < 0 || x >= MAP_SIZE || y < 0 || y >= MAP_SIZE) return 1;
    return map[Math.floor(y)][Math.floor(x)];
}

function startPortalTransition(incrementRoom = true) {
    isTransitioning = true;
    transitionAlpha = 0.0;
    
    const interval = setInterval(() => {
        transitionAlpha += 0.1;
        if (transitionAlpha >= 1.0) {
            clearInterval(interval);
            
            if (incrementRoom) {
                roomCount++;
                totalPortalCount++;
            }
            
            generateDenseMaze();
            
            posX = 1.5;
            posY = 1.5;
            angle = 0;
            pitchAngle = 0;
            updateDirection();
            
            if(devModeActive) { syncInputsToConfig(); }
            
            const reverseInterval = setInterval(() => {
                transitionAlpha -= 0.1;
                if (transitionAlpha <= 0.0) {
                    transitionAlpha = 0.0;
                    isTransitioning = false;
                    clearInterval(reverseInterval);
                }
            }, 100); 
        }
    }, 100); 
}

function update(timeScale) {
    if (isTransitioning || document.body.classList.contains('inverted-end')) return;

    let currentTime = performance.now();
    
    if (devModeActive) {
        let elapsed = (currentTime - startTime) / 1000;
        document.getElementById('stat-time').innerText = elapsed.toFixed(1) + "s";
        document.getElementById('stat-fps').innerText = currentFpsDisplay;
        let avgFps = totalFrameCount / (elapsed || 1);
        document.getElementById('stat-avg-fps').innerText = Math.round(avgFps);
        document.getElementById('stat-portals').innerText = totalPortalCount;
    }

    if (npcActive && npcDialogueStep === -1 && !wasteSpeechTriggered) {
        if (currentTime - lastMoveTime > 5000) {
            screenFogIntensity = Math.min(1.0, screenFogIntensity + 0.0033 * timeScale);
            if (screenFogIntensity >= 1.0) {
                wasteSpeechTriggered = true;
                document.exitPointerLock();
                diagOverlay.style.display = 'block';
                typeText("此處不容那資源浪費者.", () => {
                    setTimeout(triggerCurseEnd, 2500);
                });
            }
        } else {
            screenFogIntensity = Math.max(0, screenFogIntensity - 0.01 * timeScale);
        }
    }

    if (npcDialogueStep !== -1) {
        angle = Math.atan2(npcY - posY, npcX - posX);
        pitchAngle = 0;
        updateDirection();
        return; 
    }
    
    if (wasteSpeechTriggered) return;

    // 處理飛行或普通跳躍物理
    if (cfg.fly) {
        if (controls.shift) {
            zOffset = Math.min(600, zOffset + 6 * timeScale);
        } else if (isJumping) { 
            zOffset = Math.max(-200, zOffset - 6 * timeScale);
        }
    } else if (cfg.jumpable && isJumping) {
        jumpTime += 0.06 * timeScale;
        zOffset = Math.sin(jumpTime) * 160; 
        if (jumpTime >= Math.PI) {
            isJumping = false;
            zOffset = 0;
        }
    } else {
        zOffset = 0;
    }

    let baseSpeed = (controls.shift && !cfg.fly) ? cfg.runSpeed : cfg.walkSpeed;
    let speed = baseSpeed * timeScale;
    let moveX = 0;
    let moveY = 0;
    if (controls.forward) { moveX += dirX; moveY += dirY; }
    if (controls.backward) { moveX -= dirX; moveY -= dirY; }
    if (controls.left) { moveX -= planeX; moveY -= planeY; }  
    if (controls.right) { moveX += planeX; moveY += planeY; } 
    
    if (moveX !== 0 || moveY !== 0) {
        let len = Math.sqrt(moveX*moveX + moveY*moveY);
        moveX /= len; moveY /= len;
        let nextX = posX + moveX * speed;
        let nextY = posY + moveY * speed;
        
        let pCurrentX = Math.floor(nextX);
        let pCurrentY = Math.floor(nextY);

        const hitPortal = (pCurrentX === portalX && pCurrentY === portalY) || 
                          (pCurrentX + 1 === portalX && pCurrentY === portalY) ||
                          (pCurrentX - 1 === portalX && pCurrentY === portalY) ||
                          (pCurrentX === portalX && pCurrentY + 1 === portalY) ||
                          (pCurrentX === portalX && pCurrentY - 1 === portalY);

        if (hitPortal && !cfg.noclip) {
            startPortalTransition(true); 
            return;
        }

        if (cfg.noclip) {
            posX = nextX;
            posY = nextY;
        } else {
            if (getGrid(nextX + Math.sign(moveX)*0.25, posY) === 0) posX = nextX;
            if (getGrid(posX, nextY + Math.sign(moveY)*0.25) === 0) posY = nextY;
        }
    }

    if (npcActive && npcDialogueStep === -1) {
        let targetNpcX = posX - dirX * 0.7;
        let targetNpcY = posY - dirY * 0.7;
        npcX += (targetNpcX - npcX) * 0.15 * timeScale;
        npcY += (targetNpcY - npcY) * 0.15 * timeScale;
    }

    if (smileyActive) {
        let sToPlayerX = posX - smileyX;
        let sToPlayerY = posY - smileyY;
        let sDist = Math.sqrt(sToPlayerX*sToPlayerX + sToPlayerY*sToPlayerY);

        if (sDist < 0.35 && !cfg.noclip) {
            triggerSmileyJumpscare();
            return;
        }

        let angleToSmiley = Math.atan2(sToPlayerY, sToPlayerX);
        let sAngleDiff = angleToSmiley - angle;
        while (sAngleDiff < -Math.PI) sAngleDiff += Math.PI * 2;
        while (sAngleDiff > Math.PI) sAngleDiff -= Math.PI * 2;

        if (Math.abs(sAngleDiff) < 0.55 && sDist < 20) {
            smileyInVision = true; 
        } else {
            smileyInVision = false;
        }

        if (!smileyInVision) {
            smileyX += (sToPlayerX / sDist) * smileySpeed * timeScale;
            smileyY += (sToPlayerY / sDist) * smileySpeed * timeScale;
        }
    }
}

let zBuffer = new Float32Array(1920);

function render() {
    const w = canvas.width;
    const h = canvas.height;
    const imgData = ctx.createImageData(w, h);
    const buffer = new Uint32Array(imgData.data.buffer);
    const fTex = textures['floor'].data;
    const cTex = textures['ceiling'].data;
    
    // 渲染主景 (帶入垂直視角 pitchAngle 與高度 zOffset 偏移量)
    for (let x = 0; x < w; x++) {
        let cameraX = 2 * x / w - 1;
        let rayDirX = dirX + planeX * cameraX;
        let rayDirY = dirY + planeY * cameraX;
        let mapX = Math.floor(posX);
        let mapY = Math.floor(posY);
        let sideDistX, sideDistY;
        let deltaDistX = (rayDirX === 0) ? Infinity : Math.abs(1 / rayDirX);
        let deltaDistY = (rayDirY === 0) ? Infinity : Math.abs(1 / rayDirY);
        let perpWallDist;
        let stepX, stepY;
        let hit = 0, side, texNum = 1;
        
        if (rayDirX < 0) { stepX = -1; sideDistX = (posX - mapX) * deltaDistX; }
        else             { stepX = 1; sideDistX = (mapX + 1.0 - posX) * deltaDistX; }
        if (rayDirY < 0) { stepY = -1; sideDistY = (posY - mapY) * deltaDistY; }
        else             { stepY = 1; sideDistY = (mapY + 1.0 - posY) * deltaDistY; }
        
        while (hit === 0) {
            if (sideDistX < sideDistY) { sideDistX += deltaDistX; mapX += stepX; side = 0; }
            else                       { sideDistY += deltaDistY; mapY += stepY; side = 1; }
            if (getGrid(mapX, mapY) > 0) { hit = 1; texNum = getGrid(mapX, mapY); }
        }
        
        if (side === 0) perpWallDist = (sideDistX - deltaDistX);
        else            perpWallDist = (sideDistY - deltaDistY);
        
        zBuffer[x] = perpWallDist; 
        
        let lineHeight = Math.floor(h / perpWallDist);
        
        let drawStart = Math.max(0, -lineHeight / 2 + h / 2 + pitchAngle + (zOffset / perpWallDist));
        let drawEnd = Math.min(h - 1, lineHeight / 2 + h / 2 + pitchAngle + (zOffset / perpWallDist));
        
        let wallX = (side === 0) ? posY + perpWallDist * rayDirY : posX + perpWallDist * rayDirX;
        wallX -= Math.floor(wallX);
        let texX = Math.floor(wallX * texSize);
        if (side === 0 && rayDirX > 0) texX = texSize - texX - 1;
        if (side === 1 && rayDirY < 0) texX = texSize - texX - 1;
        
        const texture = textures[texNum] ? textures[texNum].data : textures[1].data;
        for (let y = Math.floor(drawStart); y < Math.floor(drawEnd); y++) {
            let d = Math.floor(y * 256 - h * 128 - (pitchAngle * 256) - (zOffset * 256 / perpWallDist) + lineHeight * 128);
            let texY = Math.floor(((d * texSize) / lineHeight) / 256);
            texY = Math.max(0, Math.min(texSize - 1, texY));
            let texPos = (texY * texSize + texX) * 4;
            let r = texture[texPos];
            let g = texture[texPos + 1];
            let b = texture[texPos + 2];
            if (side === 1) { r >>= 1; g >>= 1; b >>= 1; } 
            buffer[y * w + x] = (255 << 24) | (b << 16) | (g << 8) | r;
        }
        
        let floorXWall, floorYWall;
        if (side === 0 && rayDirX > 0) { floorXWall = mapX; floorYWall = mapY + wallX; }
        else if (side === 0 && rayDirX < 0) { floorXWall = mapX + 1.0; floorYWall = mapY + wallX; }
        else if (side === 1 && rayDirY > 0) { floorXWall = mapX + wallX; floorYWall = mapY; }
        else { floorXWall = mapX + wallX; floorYWall = mapY + 1.0; }
        let currentDist;
        
        for (let y = 0; y < Math.floor(drawStart); y++) {
            currentDist = h / (h - 2.0 * (y - pitchAngle - (zOffset / perpWallDist)));
            let weight = currentDist / perpWallDist;
            let currentFloorX = weight * floorXWall + (1.0 - weight) * posX;
            let currentFloorY = weight * floorYWall + (1.0 - weight) * posY;
            let cTexX = Math.floor(currentFloorX * texSize) % texSize;
            let cTexY = Math.floor(currentFloorY * texSize) % texSize;
            let cPos = (cTexY * texSize + cTexX) * 4;
            buffer[y * w + x] = (255 << 24) | (cTex[cPos+2] << 16) | (cTex[cPos+1] << 8) | cTex[cPos];
        }
        
        for (let y = Math.floor(drawEnd); y < h; y++) {
            currentDist = h / (2.0 * (y - pitchAngle - (zOffset / perpWallDist)) - h);
            let weight = currentDist / perpWallDist;
            let currentFloorX = weight * floorXWall + (1.0 - weight) * posX;
            let currentFloorY = weight * floorYWall + (1.0 - weight) * posY;
            let fTexX = Math.floor(currentFloorX * texSize) % texSize;
            let fTexY = Math.floor(currentFloorY * texSize) % texSize;
            let fPos = (fTexY * texSize + fTexX) * 4;
            buffer[y * w + x] = (255 << 24) | (fTex[fPos+2] << 16) | (fTex[fPos+1] << 8) | fTex[fPos];
        }
    }
    ctx.putImageData(imgData, 0, 0);

    let npcOnScreen = false;
    let npcScreenX = 0;
    let npcScaleHeight = 0;

    if (npcActive) {
        let spriteX = npcX - posX;
        let spriteY = npcY - posY;
        let invDet = 1.0 / (planeX * dirY - dirX * planeY);
        let transformX = invDet * (dirY * spriteX - dirX * spriteY);
        let transformY = invDet * (-planeY * spriteX + planeX * spriteY); 
        
        if (transformY > 0.05) {
            let spriteScreenX = Math.floor((w / 2) * (1 + transformX / transformY));
            let spriteHeight = Math.abs(Math.floor(h / transformY));
            let spriteWidth = Math.abs(Math.floor(h / transformY));
            let drawStartX = Math.max(0, -spriteWidth / 2 + spriteScreenX);
            let drawEndX = Math.min(w - 1, spriteWidth / 2 + spriteScreenX);
            
            npcOnScreen = true;
            npcScreenX = spriteScreenX;
            npcScaleHeight = spriteHeight;

            let currentCenterY = h / 2 + pitchAngle + (zOffset / transformY);

            ctx.fillStyle = 'rgba(8, 8, 8, 0.98)'; 
            for (let stripe = drawStartX; stripe < drawEndX; stripe++) {
                if (transformY < zBuffer[stripe]) {
                    let expr = (stripe - spriteScreenX) / (spriteWidth / 2);
                    if (Math.abs(expr) <= 1.0) {
                        let sphereFactor = Math.sqrt(1.0 - expr * expr);
                        let calculatedHeight = spriteHeight * sphereFactor * 0.75;
                        ctx.fillRect(stripe, currentCenterY - calculatedHeight / 2, 1, calculatedHeight);

                        ctx.fillStyle = 'rgba(15, 15, 15, 0.95)';
                        if (Math.random() < 0.85) {
                            ctx.beginPath();
                            ctx.arc(stripe, currentCenterY + (Math.random() - 0.5) * calculatedHeight * 1.2, 3 + Math.random() * 6, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
            }
        }
    }

    if (showRedSmile && npcOnScreen) {
        ctx.save();
        ctx.strokeStyle = '#ff0000';
        ctx.lineWidth = Math.max(5, npcScaleHeight * 0.035); 
        ctx.lineCap = 'round';
        
        let eyeOffset = npcScaleHeight * 0.14;   
        let eyeSize = npcScaleHeight * 0.045;   
        let mouthRadius = npcScaleHeight * 0.12; 
        
        let toNpcY = npcY - posY;
        let toNpcX = npcX - posX;
        let sInvDet = 1.0 / (planeX * dirY - dirX * planeY);
        let sTransformY = sInvDet * (-planeY * toNpcX + planeX * toNpcY);
        let centerY = h / 2 - npcScaleHeight * 0.05 + pitchAngle + (zOffset / sTransformY);

        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(npcScreenX - eyeOffset, centerY, eyeSize, 0, Math.PI * 2);
        ctx.arc(npcScreenX + eyeOffset, centerY, eyeSize, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(npcScreenX, centerY + npcScaleHeight * 0.08, mouthRadius, 0.1 * Math.PI, 0.9 * Math.PI);
        ctx.stroke();
        ctx.restore();
    }

    if (smileyActive) {
        let sSpriteX = smileyX - posX;
        let sSpriteY = smileyY - posY;
        let sInvDet = 1.0 / (planeX * dirY - dirX * planeY);
        let sTransformX = sInvDet * (dirY * sSpriteX - dirX * sSpriteY);
        let sTransformY = sInvDet * (-planeY * sSpriteX + planeX * sSpriteY);

        if (sTransformY > 0.1) {
            let sScreenX = Math.floor((w / 2) * (1 + sTransformX / sTransformY));
            let sHeight = Math.abs(Math.floor(h / sTransformY));
            let sWidth = sHeight; 

            ctx.save();
            let isBehindWall = sTransformY > zBuffer[sScreenX];
            ctx.globalAlpha = isBehindWall ? 0.35 : 0.95;

            let sCenterY = h / 2 + pitchAngle + (zOffset / sTransformY);
            let radius = sWidth * 0.45;

            let gradient = ctx.createRadialGradient(
                sScreenX - radius * 0.3, sCenterY - radius * 0.3, radius * 0.1,
                sScreenX, sCenterY, radius
            );
            gradient.addColorStop(0, '#ffffcc'); 
            gradient.addColorStop(0.2, '#ffff00');
            gradient.addColorStop(1, '#ffea00'); 

            ctx.fillStyle = gradient;
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = Math.max(2, sHeight * 0.012);

            ctx.beginPath();
            ctx.arc(sScreenX, sCenterY, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#000000';
            let eyeW = radius * 0.16;
            let eyeH = radius * 0.32;
            let offsetX = radius * 0.32;
            let offsetY = radius * 0.22;

            ctx.beginPath();
            ctx.ellipse(sScreenX - offsetX, sCenterY - offsetY, eyeW, eyeH, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(sScreenX + offsetX, sCenterY - offsetY, eyeW, eyeH, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#000000';
            ctx.lineWidth = Math.max(3, sHeight * 0.018);
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.arc(sScreenX, sCenterY - radius * 0.05, radius * 0.65, 0.18 * Math.PI, 0.82 * Math.PI);
            ctx.stroke();

            let leftSmileX = sScreenX - radius * 0.65 * Math.cos(0.18 * Math.PI);
            let leftSmileY = sCenterY - radius * 0.05 + radius * 0.65 * Math.sin(0.18 * Math.PI);
            ctx.beginPath();
            ctx.arc(leftSmileX - radius * 0.04, leftSmileY - radius * 0.04, radius * 0.08, 1.1 * Math.PI, 1.9 * Math.PI);
            ctx.stroke();

            let rightSmileX = sScreenX + radius * 0.65 * Math.cos(0.18 * Math.PI);
            let rightSmileY = sCenterY - radius * 0.05 + radius * 0.65 * Math.sin(0.18 * Math.PI);
            ctx.beginPath();
            ctx.arc(rightSmileX + radius * 0.04, rightSmileY - radius * 0.04, radius * 0.08, 1.1 * Math.PI, 1.9 * Math.PI);
            ctx.stroke();

            ctx.restore();
        }
    }

    if (screenFogIntensity > 0) {
        ctx.fillStyle = `rgba(12, 12, 12, ${screenFogIntensity})`;
        ctx.fillRect(0, 0, w, h);
        
        if (screenFogIntensity > 0.1) {
            ctx.fillStyle = `rgba(26, 26, 26, ${screenFogIntensity * 0.95})`;
            for (let i = 0; i < 450 * screenFogIntensity; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * w, Math.random() * h, 4 + Math.random() * 20, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    if (eyeProtectionMode) {
        ctx.fillStyle = "rgba(225, 145, 15, 0.16)";
        ctx.globalCompositeOperation = "multiply";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = "source-over";
    }

    if (transitionAlpha > 0) {
        ctx.fillStyle = `rgba(0, 0, 0, ${transitionAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // --- DevMode Minimap 地圖實時繪製管線 ---
    if (cfg.minimap) {
        ctx.save();
        let size = 6; 
        let offsetX = 30;
        let offsetY = 30;
        
        ctx.fillStyle = 'rgba(0, 40, 0, 0.65)';
        ctx.fillRect(offsetX - 5, offsetY - 5, MAP_SIZE * size + 10, MAP_SIZE * size + 10);
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 1;
        ctx.strokeRect(offsetX - 5, offsetY - 5, MAP_SIZE * size + 10, MAP_SIZE * size + 10);

        for (let y = 0; y < MAP_SIZE; y++) {
            for (let x = 0; x < MAP_SIZE; x++) {
                if (map[y][x] === 1) ctx.fillStyle = '#005500';
                else if (map[y][x] === 2) ctx.fillStyle = '#00ffff';
                else if (map[y][x] === 5) ctx.fillStyle = '#00ff00';
                else ctx.fillStyle = 'rgba(0,0,0,0)';

                if (map[y][x] !== 0) {
                    ctx.fillRect(offsetX + x * size, offsetY + y * size, size - 1, size - 1);
                }
            }
        }

        // 玩家定位點與面朝方向指引線
        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(offsetX + posX * size, offsetY + posY * size, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#ff0000';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(offsetX + posX * size, offsetY + posY * size);
        ctx.lineTo(offsetX + posX * size + dirX * 10, offsetY + posY * size + dirY * 10);
        ctx.stroke();

        // 追逐者 Smiley 地圖定位紅點
        if (smileyActive) {
            ctx.fillStyle = '#ffea00';
            ctx.beginPath();
            ctx.arc(offsetX + smileyX * size, offsetY + smileyY * size, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }
}

function frameLoop() {
    let now = performance.now();
    let dt = now - lastTime;
    
    if (cfg.fpsLimit > 0) {
        let targetInterval = 1000 / cfg.fpsLimit;
        if (dt < targetInterval) {
            requestAnimationFrame(frameLoop);
            return;
        }
    }

    lastTime = now;
    totalFrameCount++;
    fpsCountThisSecond++;

    if (now - lastFpsUpdateTime >= 1000) {
        currentFpsDisplay = fpsCountThisSecond;
        fpsCountThisSecond = 0;
        lastFpsUpdateTime = now;
    }

    if (dt > 100) dt = 16.66;
    let timeScale = dt / 16.66;

    update(timeScale);
    render();

    requestAnimationFrame(frameLoop);
}

function startLoop() {
    lastTime = performance.now();
    startTime = performance.now();
    requestAnimationFrame(frameLoop);
}

if (localStorage.getItem('the_dust_curse') !== 'true') {
    generateDenseMaze();
    resize();
    setupDevListeners();
    startLoop();
}
</script>
